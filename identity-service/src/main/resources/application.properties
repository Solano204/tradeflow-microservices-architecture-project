# ============================================================
# TradeFlow ? Identity & Merchant Service
# application.properties ? COMPLETE FILE
# ============================================================

spring.application.name=identity-service
server.port=8081

# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true

# ============================================================
# PostgreSQL
# ============================================================
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5434/identity_db}
spring.datasource.username=${POSTGRES_USER:identity}
spring.datasource.password=${POSTGRES_PASSWORD:identity_secret}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# ============================================================
# JPA
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============================================================
# Flyway
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ============================================================
# MongoDB
# ============================================================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27018/identity_readmodel}
spring.data.mongodb.database=identity_readmodel

# ============================================================
# Redis
# ============================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6380}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.min-idle=5

# ============================================================
# Kafka
# ============================================================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.retries=3
spring.kafka.producer.acks=all
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# ============================================================
# Security / JWT
# ============================================================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVICE_JWKS_URI:http://localhost:8080/.well-known/jwks.json}

# ============================================================
# AWS
# ============================================================
aws.region=${AWS_REGION:us-east-1}
aws.s3.kyc-bucket=${KYC_S3_BUCKET:tradeflow-kyc-documents-local}

# ============================================================
# Jumio ? KYC provider
# ============================================================
jumio.api.url=${JUMIO_API_URL:http://localhost:9999/mock}
jumio.api.token=${JUMIO_API_TOKEN:mock}
jumio.api.secret=${JUMIO_API_SECRET:mock}
jumio.webhook.secret=${JUMIO_WEBHOOK_SECRET:mock}

# ============================================================
# Resilience4j
# ============================================================
resilience4j.circuitbreaker.instances.jumio.sliding-window-size=10
resilience4j.circuitbreaker.instances.jumio.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.jumio.wait-duration-in-open-state=30s

resilience4j.retry.instances.jumio.max-attempts=3
resilience4j.retry.instances.jumio.wait-duration=2s
resilience4j.retry.instances.jumio.retry-exceptions=java.io.IOException,org.springframework.web.client.RestClientException

resilience4j.timelimiter.instances.jumio.timeout-duration=10s
resilience4j.timelimiter.instances.jumio.cancel-running-future=true

# ============================================================
# DISTRIBUTED TRACING ? Micrometer + Brave + Zipkin
#
# Spring Boot 3.x migration from Sleuth:
#   REMOVED: spring.sleuth.*          ? does not exist in Spring Boot 3.x
#   REMOVED: spring.zipkin.base-url  ? Sleuth property, gone in SB3
#   REMOVED: spring.cloud.*          ? Spring Cloud Sleuth discontinued
#
#   REPLACED BY: management.tracing.* and management.zipkin.*
#
# Kafka tracing  ? auto via Spring Kafka + micrometer-tracing on classpath
# MongoDB tracing ? auto via Spring Data MongoDB + Micrometer Observation API
# Redis tracing  ? auto via Lettuce + Micrometer auto-config
# JDBC tracing   ? via datasource-micrometer-spring-boot dependency
# HTTP tracing   ? auto via Spring MVC Actuator auto-config
# ============================================================

# Send 100% of traces in dev/local (use 0.1 = 10% in production)
management.tracing.sampling.probability=1.0

# Zipkin endpoint ? in Docker set ZIPKIN_URL=http://tradeflow-zipkin:9411
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

# Propagation: W3C (traceparent header) ? works across HTTP + Kafka + gRPC
# NOTE: old property was spring.sleuth.propagation.type=B3
#       New property is management.tracing.propagation.type (W3C or B3)
management.tracing.propagation.type=W3C

# ============================================================
# JDBC TRACING ? datasource-micrometer-spring-boot
# threshold must be plain long (milliseconds), NOT "300ms"
# ============================================================
jdbc.datasource-proxy.slow-query.enable-logging=true
jdbc.datasource-proxy.slow-query.threshold=300
jdbc.datasource-proxy.query.enable-logging=false

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.info.env.enabled=true

info.app.name=identity-service
info.app.description=TradeFlow Identity & Merchant Service
info.app.version=1.0.0

# ============================================================
# SpringDoc / Swagger
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================================
# Logging ? traceId + spanId in every log line
# NOTE: old pattern used %X{X-B3-TraceId} (Sleuth/B3)
#       New MDC keys are traceId and spanId (Micrometer)
# ============================================================
logging.level.io.tradeflow=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.kafka=WARN

logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]