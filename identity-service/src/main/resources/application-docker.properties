# TradeFlow ? Identity & Merchant Service
# Docker profile (runs inside container)

spring.application.name=identity-service
server.port=8081

# Virtual Threads
spring.threads.virtual.enabled=true

# PostgreSQL
spring.datasource.url=jdbc:postgresql://postgres:5432/identity_db
spring.datasource.username=identity
spring.datasource.password=identity_secret
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# MongoDB
spring.data.mongodb.uri=mongodb://mongodb:27017/identity_readmodel
spring.data.mongodb.database=identity_readmodel

# Redis
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.min-idle=5

# Kafka
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.producer.retries=3
spring.kafka.producer.acks=all
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# Security / JWT (Auth Service must be running on the same Docker network)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://auth-service:8080/.well-known/jwks.json

# AWS (will use environment variables from docker-compose)
aws.region=${AWS_REGION:us-east-1}
aws.s3.kyc-bucket=${KYC_S3_BUCKET:tradeflow-kyc-documents-dev}

# Jumio (disabled for now)
jumio.api.url=http://localhost:9999/mock
jumio.api.token=mock
jumio.api.secret=mock
jumio.webhook.secret=mock

# Resilience4j (same as local)
resilience4j.circuitbreaker.instances.jumio.sliding-window-size=10
resilience4j.circuitbreaker.instances.jumio.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.jumio.wait-duration-in-open-state=30s

resilience4j.retry.instances.jumio.max-attempts=3
resilience4j.retry.instances.jumio.wait-duration=2s
resilience4j.retry.instances.jumio.retry-exceptions=java.io.IOException,org.springframework.web.client.RestClientException

resilience4j.timelimiter.instances.jumio.timeout-duration=10s
resilience4j.timelimiter.instances.jumio.cancel-running-future=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.io.tradeflow=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.kafka=WARN