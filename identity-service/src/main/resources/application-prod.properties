# ============================================================
# TradeFlow Identity Service ? PRODUCTION (Docker)
# Spring Boot 3.2.3
# ============================================================

spring.application.name=identity-service
server.port=8081

# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true

# ============================================================
# PostgreSQL
# ============================================================
spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# JPA
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============================================================
# Flyway
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ============================================================
# MongoDB
# ============================================================
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=identity_readmodel

# ============================================================
# Redis
# ============================================================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.min-idle=5

# ============================================================
# Kafka
# ============================================================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.producer.retries=3
spring.kafka.producer.acks=all
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# ============================================================
# Security / JWT
# ============================================================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVICE_JWKS_URI}

# ============================================================
# AWS
# ============================================================
aws.region=${AWS_REGION:us-east-1}
aws.s3.kyc-bucket=${KYC_S3_BUCKET:tradeflow-kyc-documents}

# ============================================================
# Jumio
# ============================================================
# Jumio (disabled for now)
jumio.api.url=http://localhost:9999/mock
jumio.api.token=mock
jumio.api.secret=mock
jumio.webhook.secret=mock

# ============================================================
# Resilience4j
# ============================================================
resilience4j.circuitbreaker.instances.jumio.sliding-window-size=10
resilience4j.circuitbreaker.instances.jumio.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.jumio.wait-duration-in-open-state=30s

resilience4j.retry.instances.jumio.max-attempts=3
resilience4j.retry.instances.jumio.wait-duration=2s
resilience4j.retry.instances.jumio.retry-exceptions=java.io.IOException,org.springframework.web.client.RestClientException

resilience4j.timelimiter.instances.jumio.timeout-duration=10s
resilience4j.timelimiter.instances.jumio.cancel-running-future=true

# ============================================================
# DISTRIBUTED TRACING ? Micrometer + Brave + Zipkin
# ============================================================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL}/api/v2/spans
management.tracing.propagation.type=W3C

# ============================================================
# JDBC TRACING
# ============================================================
jdbc.datasource-proxy.slow-query.enable-logging=true
jdbc.datasource-proxy.slow-query.threshold=300
jdbc.datasource-proxy.query.enable-logging=false

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.info.env.enabled=true

info.app.name=identity-service
info.app.description=TradeFlow Identity & Merchant Service
info.app.version=1.0.0

# ============================================================
# SpringDoc / Swagger
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================================
# Logging
# ============================================================
logging.level.io.tradeflow=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.kafka=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]