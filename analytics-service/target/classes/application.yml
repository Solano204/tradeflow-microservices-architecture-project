server:
  port: 8090

spring:
  application:
    name: analytics-service

  threads:
    virtual:
      enabled: true

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27023/tradeflow_analytics}
      database: tradeflow_analytics
      auto-index-creation: true

    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6386}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  kafka:
    # CRITICAL: hardcoded fallback is 9092 — make sure no env var overrides this
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: analytics-service-live
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.HashMap
        spring.json.trusted.packages: "*"

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVICE_JWKS_URI:http://localhost:8080/.well-known/jwks.json}

  websocket:
    allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
    default-property-inclusion: non_null

# ===== KAFKA STREAMS =====
# APPLICATION_ID must be stable across restarts so RocksDB state stores
# are reused — changing it creates a new consumer group and loses state.
analytics:
  kafka-streams:
    application-id: analytics-streams-local-v1
    state-dir: ${ROCKSDB_STATE_DIR:./data/kafka-streams}
    window:
      hourly-ms: 3600000
      daily-ms: 86400000
      weekly-ms: 604800000
    rocksdb-max-window-days: 7
  cache:
    trending-ttl-seconds: 60
    platform-overview-ttl-seconds: 300
  snapshot:
    cron: "0 0 3 * * ?"
    batch-size: 500

# ===== RESILIENCE4J =====
resilience4j:
  circuitbreaker:
    instances:
      mongodb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      mongodb:
        max-attempts: 3
        wait-duration: 1000ms
  timelimiter:
    instances:
      mongodb:
        timeout-duration: 5s

# ===== ACTUATOR =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# ===== LOGGING =====
logging:
  level:
    io.tradeflow.analytics: DEBUG
    org.apache.kafka.streams: INFO
    org.springframework.kafka: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"