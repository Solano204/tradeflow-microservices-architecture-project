---
# Identity Service MongoDB
apiVersion: v1
kind: Service
metadata:
  name: identity-mongodb
  namespace: tradeflow-infrastructure
spec:
  ports:
    - port: 27017
  selector:
    app: identity-mongodb
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: identity-mongodb
  namespace: tradeflow-infrastructure
spec:
  serviceName: identity-mongodb
  replicas: 1
  selector:
    matchLabels:
      app: identity-mongodb
  template:
    metadata:
      labels:
        app: identity-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: "identity_readmodel"
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - db.adminCommand('ping')
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - db.adminCommand('ping')
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
