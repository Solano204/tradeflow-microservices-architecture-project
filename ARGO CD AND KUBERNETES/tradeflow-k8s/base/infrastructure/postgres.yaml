---
# Auth Service PostgreSQL
apiVersion: v1
kind: Secret
metadata:
  name: auth-postgres-secret
  namespace: tradeflow-infrastructure
type: Opaque
stringData:
  POSTGRES_DB: "tradeflow_auth"
  POSTGRES_USER: "tradeflow_auth"
  POSTGRES_PASSWORD: "tradeflow_auth_pass"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-postgres
  namespace: tradeflow-infrastructure
spec:
  ports:
    - port: 5432
  selector:
    app: auth-postgres
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-postgres
  namespace: tradeflow-infrastructure
spec:
  serviceName: auth-postgres
  replicas: 1
  selector:
    matchLabels:
      app: auth-postgres
  template:
    metadata:
      labels:
        app: auth-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: auth-postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - tradeflow_auth
                - -d
                - tradeflow_auth
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - tradeflow_auth
                - -d
                - tradeflow_auth
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
