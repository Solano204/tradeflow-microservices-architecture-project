---
# Zipkin Service
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: tradeflow-infrastructure
spec:
  type: ClusterIP
  ports:
    - port: 9411
      name: http
      targetPort: 9411
    - port: 4318
      name: otlp
      targetPort: 4318
  selector:
    app: zipkin
---
# Zipkin Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: tradeflow-infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zipkin
  template:
    metadata:
      labels:
        app: zipkin
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin:3
          ports:
            - containerPort: 9411
              name: http
            - containerPort: 4318
              name: otlp
          env:
            - name: ZIPKIN_COLLECTOR_OTLP_ENABLED
              value: "true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 30
            periodSeconds: 10
---
# Prometheus ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: tradeflow-infrastructure
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      
      - job_name: 'auth-service'
        metrics_path: '/q/metrics'
        static_configs:
          - targets: ['auth-service.tradeflow-production.svc.cluster.local:8080']
      
      - job_name: 'identity-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['identity-service.tradeflow-production.svc.cluster.local:8081']
      
      - job_name: 'catalog-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['catalog-service.tradeflow-production.svc.cluster.local:8082']
      
      - job_name: 'inventory-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['inventory-service.tradeflow-production.svc.cluster.local:8083']
      
      - job_name: 'order-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['order-service.tradeflow-production.svc.cluster.local:8084']
      
      - job_name: 'payment-service'
        metrics_path: '/q/metrics'
        static_configs:
          - targets: ['payment-service.tradeflow-production.svc.cluster.local:8085']
      
      - job_name: 'fraud-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['fraud-service.tradeflow-production.svc.cluster.local:8087']
      
      - job_name: 'search-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['search-service.tradeflow-production.svc.cluster.local:8089']
---
# Prometheus Service
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: tradeflow-infrastructure
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
  selector:
    app: prometheus
---
# Prometheus Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: tradeflow-infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=15d'
            - '--web.enable-lifecycle'
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-data
              mountPath: /prometheus
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          emptyDir: {}
---
# Grafana Service
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: tradeflow-infrastructure
spec:
  type: LoadBalancer
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: grafana
---
# Grafana Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: tradeflow-infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.3.3
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "tradeflow123"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
      volumes:
        - name: grafana-data
          emptyDir: {}
