---
# Identity Service
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: tradeflow-production
  labels:
    app: identity-service
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    app: identity-service
---
# Identity Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: tradeflow-production
  labels:
    app: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      imagePullSecrets:
        - name: ecr-pull-secret
      containers:
        - name: identity-service
          image: joshua76i/tradeflow-identity-service:1.0.0
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: identity-service-config
            - secretRef:
                name: identity-service-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
