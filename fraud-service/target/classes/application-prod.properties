# ============================================================
# TradeFlow Fraud Service ? PRODUCTION (Docker)
# Spring Boot 3.2.3
# ============================================================

spring.application.name=fraud-service
server.port=8087

# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true

# ============================================================
# PostgreSQL
# ============================================================
spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============================================================
# Flyway
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ============================================================
# Spring Batch
# ============================================================
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# ============================================================
# MongoDB
# ============================================================
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=fraud_db

# ============================================================
# Redis
# ============================================================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=1000ms
spring.data.redis.lettuce.pool.max-active=10

# ============================================================
# Kafka
# ============================================================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# ============================================================
# Spring AI ? OpenAI
# ============================================================
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-REPLACE_WITH_REAL_KEY}
spring.ai.openai.embedding.options.model=text-embedding-3-small
# For local dev/mock, point to mock server:
# spring.ai.openai.base-url=${OPENAI_BASE_URL:http://tradeflow-openai-mock:8080}

# ============================================================
# Security / JWT
# ============================================================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVICE_JWKS_URI}

# ============================================================
# Fraud Domain Config
# ============================================================
fraud.model.version=v2024-W01
fraud.cold-start.threshold=3
fraud.cold-start.max-amount=3200
fraud.threshold.review=0.65
fraud.threshold.block=0.85
fraud.weight.ml=0.60
fraud.weight.amount-deviation=0.20
fraud.weight.velocity=0.10
fraud.weight.device-ip=0.10

# ============================================================
# Resilience4j
# ============================================================
resilience4j.timelimiter.instances.embedding-client.timeout-duration=300ms
resilience4j.timelimiter.instances.embedding-client.cancel-running-future=true
resilience4j.retry.instances.embedding-client.max-attempts=2
resilience4j.retry.instances.embedding-client.wait-duration=50ms

# ============================================================
# SpringDoc
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================================
# DISTRIBUTED TRACING ? Micrometer + Brave + Zipkin
# ============================================================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL}/api/v2/spans
management.tracing.propagation.type=W3C

# ============================================================
# JDBC TRACING
# ============================================================
jdbc.datasource-proxy.slow-query.enable-logging=true
jdbc.datasource-proxy.slow-query.threshold=200
jdbc.datasource-proxy.query.enable-logging=false

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ============================================================
# Logging
# ============================================================
logging.level.io.tradeflow=INFO
logging.level.org.springframework.ai=INFO
logging.level.org.springframework.batch=WARN
logging.level.org.springframework.kafka=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]