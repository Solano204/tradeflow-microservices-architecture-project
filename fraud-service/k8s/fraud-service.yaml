---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fraud-service-config
  namespace: tradeflow
data:
  POSTGRES_URL: "jdbc:postgresql://postgres-service:5432/fraud_db"
  MONGO_URI: "mongodb://mongo-service:27017/fraud_db"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  AUTH_SERVICE_JWKS_URI: "http://auth-service:8080/.well-known/jwks.json"

---
apiVersion: v1
kind: Secret
metadata:
  name: fraud-service-secrets
  namespace: tradeflow
type: Opaque
stringData:
  POSTGRES_USER: "fraud"
  POSTGRES_PASSWORD: "REPLACE_WITH_VAULT_SECRET"
  OPENAI_API_KEY: "sk-REPLACE_WITH_VAULT_SECRET"

---
apiVersion: v1
kind: Service
metadata:
  name: fraud-service
  namespace: tradeflow
  labels:
    app: fraud-service
spec:
  type: ClusterIP
  selector:
    app: fraud-service
  ports:
    - name: http
      port: 8086
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-service
  namespace: tradeflow
  labels:
    app: fraud-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fraud-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: fraud-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: fraud-service
          image: tradeflow/fraud-service:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: fraud-service-config
            - secretRef:
                name: fraud-service-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"     # Spring AI + embedding model response parsing needs headroom
            limits:
              cpu: "2000m"
              memory: "2Gi"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 15"]

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fraud-service-hpa
  namespace: tradeflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fraud-service
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fraud-service-pdb
  namespace: tradeflow
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: fraud-service

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fraud-service-netpol
  namespace: tradeflow
spec:
  podSelector:
    matchLabels:
      app: fraud-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: order-service
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - protocol: TCP
          port: 27017
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - podSelector:
            matchLabels:
              app: auth-service
      ports:
        - protocol: TCP
          port: 8080
    # OpenAI embedding API — outbound HTTPS only
    - ports:
        - protocol: TCP
          port: 443
