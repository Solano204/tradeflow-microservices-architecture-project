# ============================================================
# TradeFlow ? Fraud Detection Service
# application.properties ? COMPLETE FILE (tracing added)
# ============================================================

spring.application.name=fraud-service
server.port=8087

# --- Virtual Threads (Java 21) ---
spring.threads.virtual.enabled=true

# --- PostgreSQL ---
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5439/fraud_db}
spring.datasource.username=${POSTGRES_USER:fraud}
spring.datasource.password=${POSTGRES_PASSWORD:fraud_secret}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Spring Batch ---
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# --- MongoDB ---
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27022/fraud_db}
spring.data.mongodb.database=fraud_db

# --- Redis ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6383}
spring.data.redis.timeout=1000ms
spring.data.redis.lettuce.pool.max-active=10

# --- Kafka ---
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# --- Spring AI ---
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-REPLACE_WITH_REAL_KEY}
spring.ai.openai.embedding.options.model=text-embedding-3-small

# --- Security / JWT ---
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVICE_JWKS_URI:http://localhost:8080/.well-known/jwks.json}

# --- Fraud Domain ---
fraud.model.version=v2024-W01
fraud.cold-start.threshold=3
fraud.cold-start.max-amount=3200
fraud.threshold.review=0.65
fraud.threshold.block=0.85
fraud.weight.ml=0.60
fraud.weight.amount-deviation=0.20
fraud.weight.velocity=0.10
fraud.weight.device-ip=0.10

# --- Resilience4j ---
resilience4j.timelimiter.instances.embedding-client.timeout-duration=300ms
resilience4j.timelimiter.instances.embedding-client.cancel-running-future=true
resilience4j.retry.instances.embedding-client.max-attempts=2
resilience4j.retry.instances.embedding-client.wait-duration=50ms

# --- SpringDoc ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================================
# ? DISTRIBUTED TRACING ? Micrometer + Zipkin
# ============================================================

# 100% sampling in dev ? use 0.1 (10%) in prod
management.tracing.sampling.probability=1.0

# Zipkin endpoint ? same instance as catalog/auth/order services
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

# W3C propagation ? "traceparent" header works across HTTP + Kafka
# The Order Service sends cmd.score-transaction with W3C headers injected.
# This setting ensures Fraud Service READS those headers and continues the trace.
management.tracing.propagation.type=W3C

# ? Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ? JDBC tracing (datasource-micrometer-spring-boot)
# fraud_scores_audit INSERTs and Spring Batch job queries appear as child spans
jdbc.datasource-proxy.slow-query.enable-logging=true
jdbc.datasource-proxy.slow-query.threshold=200
jdbc.datasource-proxy.query.enable-logging=false

# ? Include traceId in every log line (MDC)
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [traceId=%X{traceId} spanId=%X{spanId}] %-5level %logger{36} - %msg%n

# --- Logging ---
logging.level.io.tradeflow=INFO
logging.level.org.springframework.ai=INFO
logging.level.org.springframework.batch=WARN
logging.level.io.tradeflow.fraud.service.OutboxRelayService=DEBUG
logging.level.org.springframework.kafka=INFO