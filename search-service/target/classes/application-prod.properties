# ============================================================
# TradeFlow Search Service ? PRODUCTION (Docker)
# Spring Boot 3.2.3
# ============================================================

spring.application.name=search-service
server.port=8089

# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true

# ============================================================
# ELASTICSEARCH
# ============================================================
elasticsearch.host=${ES_HOST:tradeflow-search-elasticsearch}
elasticsearch.port=${ES_PORT:9200}
elasticsearch.index.alias=products

# ============================================================
# KAFKA
# ============================================================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.HashMap
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# ============================================================
# REDIS ? fallback cache
# ============================================================
spring.data.redis.host=${REDIS_HOST:tradeflow-search-redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=500ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=2

search.fallback.redis-key=fallback:top1000

# ============================================================
# Security / JWT
# ============================================================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVICE_JWKS_URI}

# ============================================================
# Internal Services
# ============================================================
services.catalog.url=${CATALOG_SERVICE_URL:http://tradeflow-catalog-service:8082}
services.inventory.url=${INVENTORY_SERVICE_URL:http://tradeflow-inventory-service:8083}

# ============================================================
# Resilience4j ? Elasticsearch circuit breaker
# ============================================================
resilience4j.circuitbreaker.instances.elasticsearch.sliding-window-size=20
resilience4j.circuitbreaker.instances.elasticsearch.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.elasticsearch.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.elasticsearch.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.elasticsearch.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.elasticsearch.record-exceptions=java.net.ConnectException,java.util.concurrent.TimeoutException,co.elastic.clients.elasticsearch._types.ElasticsearchException

resilience4j.timelimiter.instances.elasticsearch.timeout-duration=3s
resilience4j.timelimiter.instances.elasticsearch.cancel-running-future=true

resilience4j.retry.instances.elasticsearch.max-attempts=3
resilience4j.retry.instances.elasticsearch.wait-duration=1000ms
resilience4j.retry.instances.elasticsearch.retry-exceptions=java.net.ConnectException,java.util.concurrent.TimeoutException

resilience4j.bulkhead.instances.elasticsearch.max-concurrent-calls=10
resilience4j.bulkhead.instances.elasticsearch.max-wait-duration=2s

# ============================================================
# DISTRIBUTED TRACING ? Micrometer + Brave + Zipkin
# ============================================================
management.zipkin.tracing.endpoint=${ZIPKIN_URL}/api/v2/spans
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=W3C
management.tracing.enabled=true

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=always

info.app.name=search-service
info.app.description=TradeFlow Search Service
info.app.version=1.0.0

# ============================================================
# SpringDoc
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ============================================================
# Jackson
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ============================================================
# Logging
# ============================================================
logging.level.io.tradeflow=INFO
logging.level.co.elastic.clients=WARN
logging.level.org.springframework.kafka=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]