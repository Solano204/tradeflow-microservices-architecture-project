# ============================================================
# TradeFlow ? Search Service
# application.properties ? COMPLETE FILE
# ============================================================

spring.application.name=search-service
server.port=8089

# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true

# ============================================================
# ELASTICSEARCH
# ============================================================
elasticsearch.host=${ES_HOST:localhost}
elasticsearch.port=${ES_PORT:9200}
elasticsearch.index.alias=products

# ============================================================
# KAFKA
# ============================================================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# ErrorHandlingDeserializer chain ? prevents __TypeId__ crash
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.HashMap
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# ============================================================
# REDIS ? fallback cache for Circuit Breaker open scenario
# ============================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=500ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=2

search.fallback.redis-key=fallback:top1000

# ============================================================
# SECURITY / JWT
# ============================================================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVICE_JWKS_URI:http://localhost:8080/.well-known/jwks.json}

# ============================================================
# INTERNAL SERVICES
# ============================================================
services.catalog.url=${CATALOG_SERVICE_URL:http://localhost:8082}
services.inventory.url=${INVENTORY_SERVICE_URL:http://localhost:8083}

# ============================================================
# RESILIENCE4J ? Elasticsearch circuit breaker
# ============================================================
resilience4j.circuitbreaker.instances.elasticsearch.sliding-window-size=20
resilience4j.circuitbreaker.instances.elasticsearch.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.elasticsearch.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.elasticsearch.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.elasticsearch.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.elasticsearch.record-exceptions=java.net.ConnectException,java.util.concurrent.TimeoutException,co.elastic.clients.elasticsearch._types.ElasticsearchException

resilience4j.timelimiter.instances.elasticsearch.timeout-duration=3s
resilience4j.timelimiter.instances.elasticsearch.cancel-running-future=true

resilience4j.retry.instances.elasticsearch.max-attempts=3
resilience4j.retry.instances.elasticsearch.wait-duration=1000ms
resilience4j.retry.instances.elasticsearch.retry-exceptions=java.net.ConnectException,java.util.concurrent.TimeoutException

resilience4j.bulkhead.instances.elasticsearch.max-concurrent-calls=10
resilience4j.bulkhead.instances.elasticsearch.max-wait-duration=2s

# ============================================================
# DISTRIBUTED TRACING ? Micrometer + Brave ? Zipkin
#
# Spring Boot 3.x auto-configures everything below from these properties.
# NO manual beans needed for URLConnectionSender, AsyncReporter,
# ZipkinSpanHandler, or Tracing ? Spring Boot BOM manages all of it.
#
# What gets auto-traced with zero config:
#   HTTP inbound  ? Spring MVC Actuator auto-config
#   HTTP outbound ? WebClient.Builder (ObservationWebClientCustomizer)
#   Kafka         ? TracingProducer/TracingConsumer in InfrastructureConfig
# ============================================================

# Zipkin endpoint ? in Docker set ZIPKIN_URL=http://tradeflow-zipkin:9411
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

# Send 100% of traces in dev/local (use 0.1 = 10% in production)
management.tracing.sampling.probability=1.0

# W3C propagation (traceparent header) ? works across HTTP + Kafka + gRPC
# NOTE: must match ALL other services. If identity-service uses W3C, use W3C here.
# W3C header format: traceparent: 00-<traceId>-<spanId>-01
management.tracing.propagation.type=W3C

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=always
management.tracing.enabled=true

info.app.name=search-service
info.app.description=TradeFlow Search Service
info.app.version=1.0.0

# ============================================================
# SPRINGDOC / SWAGGER
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ============================================================
# JACKSON
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ============================================================
# LOGGING ? traceId + spanId in every log line
# MDC keys "traceId" and "spanId" are populated automatically
# by Micrometer Tracing (NOT X-B3-TraceId ? that was Sleuth/Boot2)
# ============================================================
logging.level.io.tradeflow=DEBUG
logging.level.co.elastic.clients=WARN
logging.level.org.springframework.kafka=INFO
logging.level.org.springframework.security=WARN

logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]