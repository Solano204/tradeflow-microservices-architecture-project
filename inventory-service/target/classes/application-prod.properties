# ============================================================
# TradeFlow Inventory Service ? PRODUCTION (Docker)
# Spring Boot 3.2.3
# ============================================================

spring.application.name=inventory-service
server.port=8083

# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true

# ============================================================
# PostgreSQL
# ============================================================
spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.validation-timeout=2000
spring.datasource.hikari.idle-timeout=600000

# ============================================================
# JPA
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============================================================
# Flyway
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ============================================================
# Kafka
# ============================================================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# ============================================================
# Security / JWT
# ============================================================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVICE_JWKS_URI}

# ============================================================
# Resilience4j
# ============================================================
resilience4j.retry.instances.inventory-reserve.max-attempts=3
resilience4j.retry.instances.inventory-reserve.wait-duration=100ms
resilience4j.retry.instances.inventory-reserve.enable-exponential-backoff=true
resilience4j.retry.instances.inventory-reserve.exponential-backoff-multiplier=2
resilience4j.retry.instances.inventory-reserve.retry-exceptions=jakarta.persistence.OptimisticLockException,org.springframework.orm.ObjectOptimisticLockingFailureException

resilience4j.retry.instances.inventory-write.max-attempts=3
resilience4j.retry.instances.inventory-write.wait-duration=100ms
resilience4j.retry.instances.inventory-write.enable-exponential-backoff=true
resilience4j.retry.instances.inventory-write.exponential-backoff-multiplier=2
resilience4j.retry.instances.inventory-write.retry-exceptions=jakarta.persistence.OptimisticLockException,org.springframework.orm.ObjectOptimisticLockingFailureException

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ============================================================
# SpringDoc
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================================
# DISTRIBUTED TRACING ? Micrometer + Brave + Zipkin
# ============================================================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL}/api/v2/spans
management.tracing.propagation.type=W3C

jdbc.datasource-proxy.slow-query.enable-logging=true
jdbc.datasource-proxy.slow-query.threshold=300
jdbc.datasource-proxy.query.enable-logging=false

# ============================================================
# Logging
# ============================================================
logging.level.io.tradeflow=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.kafka=WARN
logging.level.io.github.resilience4j=WARN
logging.level.io.tradeflow.inventory.service.OutboxRelayService=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]