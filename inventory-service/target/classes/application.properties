spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
logging.level.io.tradeflow.inventory.service.OutboxRelayService=DEBUG
spring.application.name=inventory-service
server.port=8083 

# ??? Virtual Threads (Java 21) ??????????????????????????????
spring.threads.virtual.enabled=true

# ??? PostgreSQL (sole data store) ???????????????????????????
# FIXED: Using port 5436 to match docker-compose
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5436/inventory_db}
spring.datasource.username=${POSTGRES_USER:inventory}
spring.datasource.password=${POSTGRES_PASSWORD:inventory_secret}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.validation-timeout=2000

# ??? JPA ????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ??? Flyway ?????????????????????????????????????????????????
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ??? Kafka ??????????????????????????????????????????????????
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# ??? Security / JWT ?????????????????????????????????????????
# Comment this out if Auth Service isn't running
# spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVICE_JWKS_URI:http://localhost:8080/.well-known/jwks.json}

# ??? Resilience4j ???????????????????????????????????????????
resilience4j.retry.instances.inventory-reserve.max-attempts=3
resilience4j.retry.instances.inventory-reserve.wait-duration=100ms
resilience4j.retry.instances.inventory-reserve.enable-exponential-backoff=true
resilience4j.retry.instances.inventory-reserve.exponential-backoff-multiplier=2
resilience4j.retry.instances.inventory-reserve.retry-exceptions=jakarta.persistence.OptimisticLockException,org.springframework.orm.ObjectOptimisticLockingFailureException

resilience4j.retry.instances.inventory-write.max-attempts=3
resilience4j.retry.instances.inventory-write.wait-duration=100ms
resilience4j.retry.instances.inventory-write.enable-exponential-backoff=true
resilience4j.retry.instances.inventory-write.exponential-backoff-multiplier=2
resilience4j.retry.instances.inventory-write.retry-exceptions=jakarta.persistence.OptimisticLockException,org.springframework.orm.ObjectOptimisticLockingFailureException

# ??? Actuator ???????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ??? SpringDoc ??????????????????????????????????????????????
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ??? Logging ????????????????????????????????????????????????
logging.level.io.tradeflow=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.kafka=WARN
logging.level.io.github.resilience4j=WARN

# ??? Security / JWT ?????????????????????????????????????????
# Point to Auth Service JWKS endpoint (update port if needed)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/.well-known/jwks.json






# ============================================================
# DISTRIBUTED TRACING ? Micrometer + Brave + Zipkin
# ============================================================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
management.tracing.propagation.type=W3C

# JDBC tracing
jdbc.datasource-proxy.slow-query.enable-logging=true
jdbc.datasource-proxy.slow-query.threshold=300
jdbc.datasource-proxy.query.enable-logging=false

# Trace IDs in logs
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]