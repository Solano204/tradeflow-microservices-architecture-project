---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-service-config
  namespace: tradeflow
data:
  POSTGRES_URL: "jdbc:postgresql://postgres-service:5432/inventory_db"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  AUTH_SERVICE_JWKS_URI: "http://auth-service:8080/.well-known/jwks.json"

---
apiVersion: v1
kind: Secret
metadata:
  name: inventory-service-secrets
  namespace: tradeflow
type: Opaque
stringData:
  POSTGRES_USER: "inventory"
  POSTGRES_PASSWORD: "REPLACE_WITH_VAULT_SECRET"

---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: tradeflow
  labels:
    app: inventory-service
spec:
  type: ClusterIP
  selector:
    app: inventory-service
  ports:
    - name: http
      port: 8083
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: tradeflow
  labels:
    app: inventory-service
spec:
  replicas: 3   # multiple replicas — ShedLock handles @Scheduled dedup
  selector:
    matchLabels:
      app: inventory-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: inventory-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: inventory-service
          image: tradeflow/inventory-service:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: inventory-service-config
            - secretRef:
                name: inventory-service-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 15"]

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inventory-service-hpa
  namespace: tradeflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inventory-service
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: inventory-service-pdb
  namespace: tradeflow
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: inventory-service

---
# CRITICAL NETWORK POLICY
# /internal/* endpoints are reachable ONLY from order-service pods.
# The internal availability check (Endpoint 8) must never be callable by external clients.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: inventory-service-netpol
  namespace: tradeflow
spec:
  podSelector:
    matchLabels:
      app: inventory-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # External traffic via Gateway (Endpoints 2, 3, 7 for merchants)
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8080
    # Internal calls from Order Service (Endpoints 4, 5, 6, 8 — SAGA operations)
    - from:
        - podSelector:
            matchLabels:
              app: order-service
      ports:
        - protocol: TCP
          port: 8080
    # Monitoring
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - podSelector:
            matchLabels:
              app: auth-service
      ports:
        - protocol: TCP
          port: 8080
