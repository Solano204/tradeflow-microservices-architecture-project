version: '3.9'

# ============================================================
# TradeFlow — Infrastructure + Auto Topic Creation
# Run with: docker compose -f docker-compose.infra.yml up -d
# ============================================================

services:

  # ============================================================
  # KAFKA
  # ============================================================

  tradeflow-zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: tradeflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - tradeflow-shared
    restart: unless-stopped

  tradeflow-kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: tradeflow-kafka
    depends_on:
      - tradeflow-zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: tradeflow-zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://tradeflow-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ============================================================
  # KAFKA TOPIC CREATION — ALL topics used by TradeFlow
  # ============================================================
  tradeflow-topic-init:
    image: confluentinc/cp-kafka:7.6.0   # ← add this
    depends_on:
        tradeflow-kafka:
          condition: service_healthy
    command:
      - bash
      - -c
      - |
        set -e
        echo 'Creating all TradeFlow Kafka topics...'
        
        kafka-topics --create --topic auth-outbox --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic identity.buyer-events --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic identity.merchant-events --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic identity.admin-events --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic identity.events --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic auth-events --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic catalog.product-events --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic catalog.events --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic inventory.events --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic order.events --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic notifications --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic cmd.reserve-inventory --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic cmd.confirm-inventory --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic cmd.release-inventory --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic cmd.score-transaction --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic cmd.charge-payment --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic payment.events --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic refund.requested --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic dispute.events --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic fraud.events --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic fraud.alerts --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        kafka-topics --create --topic fraud.confirmed --partitions 3 --replication-factor 1 --bootstrap-server tradeflow-kafka:29092 --if-not-exists
        
        echo 'All TradeFlow Kafka topics created!'
        kafka-topics --list --bootstrap-server tradeflow-kafka:29092
    networks:
      - tradeflow-shared
    restart: "no"

  tradeflow-kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tradeflow-kafka-ui
    depends_on:
      tradeflow-kafka:
        condition: service_healthy
    ports:
      - "8095:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: tradeflow-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: tradeflow-kafka:29092
    networks:
      - tradeflow-shared
    restart: unless-stopped

  # ============================================================
  # OBSERVABILITY
  # ============================================================

  tradeflow-zipkin:
    image: openzipkin/zipkin:3
    container_name: tradeflow-zipkin
    ports:
      - "9411:9411"
      - "4318:4318"
    environment:
      ZIPKIN_COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9411/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  tradeflow-prometheus:
    image: prom/prometheus:v2.51.0
    container_name: tradeflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - tradeflow-shared
    restart: unless-stopped

  tradeflow-grafana:
    image: grafana/grafana:10.3.3
    container_name: tradeflow-grafana
    depends_on:
      - tradeflow-prometheus
      - tradeflow-zipkin
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: tradeflow123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - tradeflow-shared
    restart: unless-stopped

  # ============================================================
  # AUTH SERVICE DEPS
  # ============================================================

  tradeflow-auth-postgres:
    image: postgres:16-alpine
    container_name: tradeflow-auth-postgres
    environment:
      POSTGRES_DB: tradeflow_auth
      POSTGRES_USER: tradeflow_auth
      POSTGRES_PASSWORD: tradeflow_auth_pass
    ports:
      - "5433:5432"
    volumes:
      - auth-pgdata:/var/lib/postgresql/data
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U tradeflow_auth -d tradeflow_auth" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  tradeflow-auth-redis:
    image: redis:7.4-alpine
    container_name: tradeflow-auth-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - auth-redisdata:/data
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ============================================================
  # IDENTITY SERVICE DEPS
  # ============================================================

  tradeflow-identity-postgres:
    image: postgres:16-alpine
    container_name: tradeflow-identity-postgres
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: identity_secret
    ports:
      - "5434:5432"
    volumes:
      - identity-pgdata:/var/lib/postgresql/data
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U identity -d identity_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  tradeflow-identity-mongodb:
    image: mongo:7.0
    container_name: tradeflow-identity-mongodb
    environment:
      MONGO_INITDB_DATABASE: identity_readmodel
    ports:
      - "27018:27017"
    volumes:
      - identity-mongodata:/data/db
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  tradeflow-identity-redis:
    image: redis:7.4-alpine
    container_name: tradeflow-identity-redis
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - identity-redisdata:/data
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ============================================================
  # CATALOG SERVICE DEPS
  # ============================================================

  tradeflow-catalog-postgres:
    image: postgres:16-alpine
    container_name: tradeflow-catalog-postgres
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog_secret
    ports:
      - "5435:5432"
    volumes:
      - catalog-pgdata:/var/lib/postgresql/data
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U catalog -d catalog_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  tradeflow-catalog-mongodb:
    image: mongo:7.0
    container_name: tradeflow-catalog-mongodb
    environment:
      MONGO_INITDB_DATABASE: catalog_details
    ports:
      - "27019:27017"
    volumes:
      - catalog-mongodata:/data/db
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  tradeflow-catalog-redis:
    image: redis:7.4-alpine
    container_name: tradeflow-catalog-redis
    command: redis-server --appendonly yes
    ports:
      - "6381:6379"
    volumes:
      - catalog-redisdata:/data
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ============================================================
  # INVENTORY SERVICE DEPS
  # ============================================================

  tradeflow-inventory-postgres:
    image: postgres:16-alpine
    container_name: tradeflow-inventory-postgres
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory_secret
    ports:
      - "5436:5432"
    volumes:
      - inventory-pgdata:/var/lib/postgresql/data
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U inventory -d inventory_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ============================================================
  # ORDER SERVICE DEPS
  # ============================================================

  tradeflow-order-postgres:
    image: postgres:16-alpine
    container_name: tradeflow-order-postgres
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order
      POSTGRES_PASSWORD: order_secret
    ports:
      - "5437:5432"
    volumes:
      - order-pgdata:/var/lib/postgresql/data
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U order -d order_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ============================================================
  # PAYMENT SERVICE DEPS
  # ============================================================

  tradeflow-payment-postgres:
    image: postgres:16-alpine
    container_name: tradeflow-payment-postgres
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment_secret
    ports:
      - "5438:5432"
    volumes:
      - payment-pgdata:/var/lib/postgresql/data
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U payment -d payment_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  tradeflow-payment-mongodb:
    image: mongo:7.0
    container_name: tradeflow-payment-mongodb
    ports:
      - "27021:27017"
    volumes:
      - payment-mongodata:/data/db
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tradeflow-payment-redis:
    image: redis:7.4-alpine
    container_name: tradeflow-payment-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6385:6379"
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # FRAUD SERVICE DEPS
  # ============================================================

  tradeflow-fraud-postgres:
    image: postgres:16-alpine
    container_name: tradeflow-fraud-postgres
    environment:
      POSTGRES_DB: fraud_db
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud_secret
    ports:
      - "5439:5432"
    volumes:
      - fraud-pgdata:/var/lib/postgresql/data
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U fraud -d fraud_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  tradeflow-fraud-mongodb:
    image: mongo:7.0
    container_name: tradeflow-fraud-mongodb
    ports:
      - "27022:27017"
    volumes:
      - fraud-mongodata:/data/db
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tradeflow-fraud-redis:
    image: redis:7.4-alpine
    container_name: tradeflow-fraud-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6383:6379"
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # SEARCH SERVICE DEPS
  # ============================================================

  tradeflow-search-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: tradeflow-search-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=tradeflow-search
      - bootstrap.memory_lock=true
    ports:
      - "9200:9200"
    volumes:
      - search-esdata:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  tradeflow-search-kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: tradeflow-search-kibana
    depends_on:
      tradeflow-search-elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://tradeflow-search-elasticsearch:9200
      - xpack.security.enabled=false
    networks:
      - tradeflow-shared
    restart: unless-stopped

  tradeflow-search-redis:
    image: redis:7.4-alpine
    container_name: tradeflow-search-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6382:6379"
    networks:
      - tradeflow-shared
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ============================================================
  # MOCK SERVERS
  # ============================================================

  tradeflow-jumio-mock:
    image: mockserver/mockserver:5.15.0
    container_name: tradeflow-jumio-mock
    ports:
      - "8097:8080"
    volumes:
      - ./mock-configs/jumio-mock-init.json:/config/jumio-mock-init.json:ro
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/jumio-mock-init.json
    networks:
      - tradeflow-shared
    restart: unless-stopped

  tradeflow-openai-mock:
    image: mockserver/mockserver:5.15.0
    container_name: tradeflow-openai-mock
    ports:
      - "8096:8080"
    volumes:
      - ./mock-configs/openai-mock-init.json:/config/openai-mock-init.json:ro
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/openai-mock-init.json
    networks:
      - tradeflow-shared
    restart: unless-stopped

  tradeflow-s3-mock:
    image: localstack/localstack:3.0
    container_name: tradeflow-s3-mock
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEBUG: 0
      DATA_DIR: /tmp/localstack/data
    volumes:
      - localstack-data:/tmp/localstack
      - ./mock-configs/s3-mock-init.sh:/etc/localstack/init/ready.d/init-s3.sh:ro
    networks:
      - tradeflow-shared
    restart: unless-stopped

# ============================================================
# VOLUMES
# ============================================================

volumes:
  auth-pgdata:
  auth-redisdata:
  identity-pgdata:
  identity-mongodata:
  identity-redisdata:
  catalog-pgdata:
  catalog-mongodata:
  catalog-redisdata:
  inventory-pgdata:
  order-pgdata:
  payment-pgdata:
  payment-mongodata:
  fraud-pgdata:
  fraud-mongodata:
  search-esdata:
  localstack-data:
  prometheus-data:
  grafana-data:

# ============================================================
# NETWORKS
# ============================================================

networks:
  tradeflow-shared:
    driver: bridge
    name: tradeflow-shared    # ← add this