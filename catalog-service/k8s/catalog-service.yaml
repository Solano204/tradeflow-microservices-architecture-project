---
apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-service-config
  namespace: tradeflow
data:
  POSTGRES_URL: "jdbc:postgresql://postgres-service:5432/catalog_db"
  MONGODB_URI: "mongodb://mongodb-service:27017/catalog_details"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  AUTH_SERVICE_JWKS_URI: "http://auth-service:8080/.well-known/jwks.json"
  AWS_REGION: "us-east-1"
  MEDIA_S3_BUCKET: "tradeflow-product-media"
  CDN_DOMAIN: "cdn.tradeflow.io"

---
apiVersion: v1
kind: Secret
metadata:
  name: catalog-service-secrets
  namespace: tradeflow
type: Opaque
stringData:
  POSTGRES_USER: "catalog"
  POSTGRES_PASSWORD: "REPLACE_WITH_VAULT_SECRET"
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_IAM_ROLE"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_IAM_ROLE"

---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: tradeflow
  labels:
    app: catalog-service
spec:
  type: ClusterIP
  selector:
    app: catalog-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: tradeflow
  labels:
    app: catalog-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: catalog-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: catalog-service-sa
      terminationGracePeriodSeconds: 60
      containers:
        - name: catalog-service
          image: tradeflow/catalog-service:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: catalog-service-config
            - secretRef:
                name: catalog-service-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          # Startup: allow time for @PostConstruct cache warm-up (up to 90s)
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 18    # 30 + 18*5 = 120s total startup budget
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          # Readiness: service not ready until cache warm-up is complete
          # (warm-up sets a readiness flag or actuator checks MongoDB/Redis/PG)
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 15"]

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catalog-service-hpa
  namespace: tradeflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalog-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: catalog-service-pdb
  namespace: tradeflow
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: catalog-service

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: catalog-service-netpol
  namespace: tradeflow
spec:
  podSelector:
    matchLabels:
      app: catalog-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
        - podSelector:
            matchLabels:
              app: order-service     # calls GET /products/{id} to validate
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - protocol: TCP
          port: 27017
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - podSelector:
            matchLabels:
              app: auth-service
      ports:
        - protocol: TCP
          port: 8080
    - ports:
        - protocol: TCP
          port: 443    # S3 + CloudFront

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: catalog-service-sa
  namespace: tradeflow
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/catalog-service-role"
