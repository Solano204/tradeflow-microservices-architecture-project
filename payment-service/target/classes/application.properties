# ============================================================
# TradeFlow Payment Service - Quarkus 3.8.3
# Mock Mode · Reactive Mutiny · PostgreSQL · MongoDB · Kafka
# ============================================================

# ============================================================
# APPLICATION BASICS
# ============================================================
quarkus.application.name=payment-service
quarkus.http.port=8085

# ============================================================
# DEV SERVICES ? disable ALL auto-containers for local dev
# ============================================================
quarkus.oidc.devservices.enabled=false
quarkus.keycloak.devservices.enabled=false
quarkus.datasource.devservices.enabled=false
quarkus.mongodb.devservices.enabled=false
quarkus.kafka.devservices.enabled=false
quarkus.redis.devservices.enabled=false
%dev.quarkus.otel.enabled=false
%dev.quarkus.oidc.enabled=false# 
# POSTGRESQL - Reactive (Non-blocking)
# ============================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${POSTGRES_USER:payment}
quarkus.datasource.password=${POSTGRES_PASSWORD:payment_secret}

quarkus.datasource.reactive.url=${POSTGRES_REACTIVE_URL:postgresql://localhost:5438/payment_db}
quarkus.datasource.reactive.max-size=20
quarkus.datasource.reactive.idle-timeout=PT10M

# JDBC for Flyway only
quarkus.datasource.jdbc.url=${POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5438/payment_db}
quarkus.datasource.jdbc.max-size=5

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# ============================================================
# MONGODB
# ============================================================
quarkus.mongodb.connection-string=${MONGO_URL:mongodb://localhost:27021/payment_audit}
quarkus.mongodb.database=payment_audit

# ============================================================
# REDIS
# ============================================================
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6385}

# ============================================================
# KAFKA BOOTSTRAP
# ============================================================
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# ============================================================
# KAFKA REACTIVE MESSAGING
# ============================================================

# CONSUMER 1: cmd.charge-payment
mp.messaging.incoming.cmd-charge-payment.connector=smallrye-kafka
mp.messaging.incoming.cmd-charge-payment.topic=cmd.charge-payment
mp.messaging.incoming.cmd-charge-payment.group.id=payment-saga-charge
mp.messaging.incoming.cmd-charge-payment.auto.offset.reset=earliest
mp.messaging.incoming.cmd-charge-payment.enable.auto.commit=false
mp.messaging.incoming.cmd-charge-payment.failure-strategy=fail
mp.messaging.incoming.cmd-charge-payment.buffer.size=500

# CONSUMER 2: refund.requested
mp.messaging.incoming.refund-requested.connector=smallrye-kafka
mp.messaging.incoming.refund-requested.topic=refund.requested
mp.messaging.incoming.refund-requested.group.id=payment-saga-refund
mp.messaging.incoming.refund-requested.auto.offset.reset=earliest
mp.messaging.incoming.refund-requested.enable.auto.commit=false
mp.messaging.incoming.refund-requested.failure-strategy=fail

# PRODUCER 1: payment-processed ? payment.events
mp.messaging.outgoing.payment-processed.connector=smallrye-kafka
mp.messaging.outgoing.payment-processed.topic=payment.events
mp.messaging.outgoing.payment-processed.acks=all

# PRODUCER 2: payment-failed ? payment.events
mp.messaging.outgoing.payment-failed.connector=smallrye-kafka
mp.messaging.outgoing.payment-failed.topic=payment.events
mp.messaging.outgoing.payment-failed.acks=all

# PRODUCER 3: refund-completed ? payment.events
mp.messaging.outgoing.refund-completed.connector=smallrye-kafka
mp.messaging.outgoing.refund-completed.topic=payment.events
mp.messaging.outgoing.refund-completed.acks=all

# PRODUCER 4: dispute-created ? dispute.events
# FIX: was incorrectly mapped to payment.events ? dispute-created is its own topic.
# OutboxRelayService.disputeEmitter was failing with SRMSG00019 because
# SmallRye couldn't resolve the channel with a duplicate topic mapping.
mp.messaging.outgoing.dispute-created.connector=smallrye-kafka
mp.messaging.outgoing.dispute-created.topic=dispute.events
mp.messaging.outgoing.dispute-created.acks=all

# PRODUCER 5: order-events ? order.events
mp.messaging.outgoing.order-events.connector=smallrye-kafka
mp.messaging.outgoing.order-events.topic=order.events
mp.messaging.outgoing.order-events.acks=all

# ============================================================
# STRIPE - MOCK MODE
# ============================================================
stripe.mock.enabled=true
stripe.mock.simulate-failures=false
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_mock_development}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_test_mock_development}
stripe.api-url=https://api.stripe.com

# ============================================================
# SECURITY - OIDC + JWT
# ============================================================
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://localhost:8080}
quarkus.oidc.client-id=payment-service
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:payment-secret}
quarkus.http.auth.proactive=false

mp.jwt.verify.publickey.location=${JWT_JWKS_URL:http://localhost:8080/.well-known/jwks.json}
mp.jwt.verify.issuer=${JWT_ISSUER:https://auth.tradeflow.io}

# ============================================================
# DUNNING
# ============================================================
dunning.grace-period-days=3
dunning.retry1-days=7
dunning.retry2-days=14
dunning.suspended-days=30

# ============================================================
# DISTRIBUTED TRACING ? OpenTelemetry ? Zipkin
#
# FIX: Zipkin does NOT natively accept OTLP protobuf at /api/v2/spans.
# That endpoint is for Zipkin's own JSON format.
# Two options:
#   A) Run an OpenTelemetry Collector that forwards to Zipkin (production)
#   B) Point directly to Zipkin's OTLP endpoint on port 4318 (Zipkin 3.x)
#
# For local dev without a Collector, use Zipkin's OTLP HTTP port:
#   http://localhost:4318/v1/traces
# If Zipkin < 3.x (no OTLP support), disable tracing export entirely:
#   quarkus.otel.exporter.otlp.traces.endpoint=none
#   OR quarkus.otel.enabled=false
# ============================================================
quarkus.otel.resource.attributes=service.name=payment-service
# Zipkin 3.x OTLP endpoint (port 4318, NOT 9411)
quarkus.otel.exporter.otlp.traces.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
quarkus.otel.exporter.otlp.traces.protocol=http/protobuf
quarkus.otel.traces.sampler=always_on
quarkus.otel.traces.sampler.arg=1.0
quarkus.otel.propagators=tracecontext,baggage
quarkus.otel.enabled=true
quarkus.otel.instrument.grpc=false

# ============================================================
# OBSERVABILITY & HEALTH
# ============================================================
quarkus.smallrye-health.root-path=/q/health
quarkus.micrometer.export.prometheus.enabled=true
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.swagger-ui.always-include=true

# ============================================================
# REST CLIENT - Stripe API
# ============================================================
quarkus.rest-client.stripe-api.url=https://api.stripe.com
quarkus.rest-client.stripe-api.read-timeout=5000
quarkus.rest-client.stripe-api.connect-timeout=2000
quarkus.rest-client.stripe-api.scope=jakarta.inject.Singleton

# ============================================================
# CORS
# ============================================================
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,https://tradeflow.io}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=Content-Type,Authorization,X-Requested-With

# ============================================================
# LOGGING
# ============================================================
quarkus.log.level=INFO
quarkus.log.category."io.tradeflow".level=INFO
quarkus.log.category."io.tradeflow.payment.service".level=DEBUG
quarkus.log.category."io.tradeflow.payment.kafka".level=DEBUG
quarkus.log.category."org.hibernate.reactive".level=WARN
quarkus.log.category."org.hibernate.event".level=WARN
quarkus.log.category."io.vertx".level=WARN
quarkus.log.category."io.smallrye.reactive.messaging".level=INFO
quarkus.log.category."io.opentelemetry".level=WARN
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) [%X{traceId},%X{spanId}] %s%e%n

# ============================================================
# DEV PROFILE OVERRIDES
# ============================================================
%dev.quarkus.datasource.reactive.url=postgresql://localhost:5438/payment_db
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5438/payment_db
%dev.quarkus.mongodb.connection-string=mongodb://localhost:27021/payment_audit
%dev.quarkus.redis.hosts=redis://localhost:6385
%dev.kafka.bootstrap.servers=localhost:9092
%dev.stripe.mock.enabled=true
%dev.quarkus.log.category."io.tradeflow.payment".level=DEBUG
%dev.quarkus.otel.exporter.otlp.traces.endpoint=http://localhost:4318/v1/traces