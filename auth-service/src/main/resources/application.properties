# ============================================================
# TradeFlow Auth Service ? Application Configuration
# ============================================================

quarkus.application.name=tradeflow-auth-service
quarkus.application.version=1.0.0
quarkus.http.port=8080
quarkus.http.root-path=/

# ============================================================
# DATASOURCE ? PostgreSQL
# ============================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:tradeflow_auth}
quarkus.datasource.password=${DB_PASSWORD:tradeflow_auth_pass}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:tradeflow_auth}
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.acquisition-timeout=30
quarkus.datasource.jdbc.leak-detection-interval=120
quarkus.datasource.jdbc.validation-query-sql=SELECT 1

# ============================================================
# FLYWAY
# ============================================================
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.out-of-order=false
quarkus.flyway.clean-disabled=true

# ============================================================
# HIBERNATE ORM
# ============================================================
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.bind-parameters=false

# ============================================================
# REDIS
# ============================================================
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
quarkus.redis.password=${REDIS_PASSWORD:}
quarkus.redis.timeout=5S
quarkus.redis.max-pool-size=20
quarkus.redis.max-pool-waiting=100

# ============================================================
# JWT
# ============================================================
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_PATH:keys/jwt-public-key.pem}
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_PATH:keys/jwt-private-key.pem}
smallrye.jwt.new-token.lifespan=900
smallrye.jwt.new-token.issuer=${JWT_ISSUER:https://auth.tradeflow.io}

tradeflow.jwt.kid=${JWT_KID:auth-key-2024-v1}
tradeflow.jwt.issuer=${JWT_ISSUER:https://auth.tradeflow.io}
tradeflow.jwt.access-token.ttl-seconds=900
tradeflow.jwt.refresh-token.ttl-seconds=2592000

tradeflow.refresh-token.redis-prefix=rt:
tradeflow.refresh-token.ttl-days=30

# ============================================================
# KAFKA
# ============================================================
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

mp.messaging.outgoing.auth-outbox.connector=smallrye-kafka
mp.messaging.outgoing.auth-outbox.topic=auth-events
mp.messaging.outgoing.auth-outbox.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.auth-outbox.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.auth-outbox.acks=all
mp.messaging.outgoing.auth-outbox.retries=3
mp.messaging.outgoing.auth-outbox.enable.idempotence=true

mp.messaging.incoming.identity-buyer-events.connector=smallrye-kafka
mp.messaging.incoming.identity-buyer-events.topic=identity.buyer-events
mp.messaging.incoming.identity-buyer-events.group.id=auth-service-user-provisioning
mp.messaging.incoming.identity-buyer-events.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.identity-buyer-events.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.identity-buyer-events.auto.offset.reset=earliest
mp.messaging.incoming.identity-buyer-events.enable.auto.commit=false

mp.messaging.incoming.identity-merchant-events.connector=smallrye-kafka
mp.messaging.incoming.identity-merchant-events.topic=identity.merchant-events
mp.messaging.incoming.identity-merchant-events.group.id=auth-service-merchant-provisioning
mp.messaging.incoming.identity-merchant-events.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.identity-merchant-events.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.identity-merchant-events.auto.offset.reset=earliest
mp.messaging.incoming.identity-merchant-events.enable.auto.commit=false

mp.messaging.incoming.identity-admin-events.connector=smallrye-kafka
mp.messaging.incoming.identity-admin-events.topic=identity.admin-events
mp.messaging.incoming.identity-admin-events.group.id=auth-service-admin-provisioning
mp.messaging.incoming.identity-admin-events.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.identity-admin-events.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.identity-admin-events.auto.offset.reset=earliest
mp.messaging.incoming.identity-admin-events.enable.auto.commit=false

# ============================================================
# OKTA SSO
# ============================================================
tradeflow.okta.enabled=${OKTA_ENABLED:false}
tradeflow.okta.issuer=${OKTA_ISSUER:https://placeholder.okta.com/oauth2/default}
tradeflow.okta.client-id=${OKTA_CLIENT_ID:placeholder-client-id}
tradeflow.okta.client-secret=${OKTA_CLIENT_SECRET:placeholder-client-secret}
tradeflow.okta.redirect-uri=${OKTA_REDIRECT_URI:http://localhost:8080/auth/okta/callback}
tradeflow.okta.scopes=openid profile email

# ============================================================
# OPENTELEMETRY ? Distributed Tracing
#
# quarkus-opentelemetry-exporter-zipkin does NOT exist in Quarkus 3.6.4.
# The only exporter bundled with quarkus-opentelemetry is OTLP.
#
# Standard Zipkin (port 9411) does NOT accept OTLP natively.
# The fix is to add an OTel Collector between Auth and Zipkin:
#
#   Auth Service (OTLP) ? OTel Collector :4318 ? Zipkin :9411
#   Spring Boot  (Zipkin v2 JSON)               ? Zipkin :9411
#
# Both end up in the same Zipkin, cross-service traces link correctly.
# See otel-collector-config.yaml for the Collector configuration.
# ============================================================

quarkus.otel.resource.attributes=service.name=tradeflow-auth-service,service.version=1.0.0,deployment.environment=local

# Sends OTLP to the OTel Collector (NOT directly to Zipkin)
# Docker env var: OTEL_COLLECTOR_URL=http://tradeflow-otel-collector:4318
quarkus.otel.exporter.otlp.traces.endpoint=${OTEL_COLLECTOR_URL:http://localhost:4318}/v1/traces
quarkus.otel.exporter.otlp.traces.protocol=http/protobuf

quarkus.otel.traces.sampler=always_on
quarkus.otel.propagators=tracecontext,baggage
quarkus.otel.enabled=true

# ============================================================
# GRPC
# ============================================================
quarkus.grpc.server.use-separate-server=false

# ============================================================
# OUTBOX RELAY
# ============================================================
tradeflow.outbox.relay.batch-size=50

# ============================================================
# LOGGING
# ============================================================
quarkus.log.console.format=%d{HH:mm:ss.SSS} [%thread] [traceId=%X{traceId}] %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."io.tradeflow".level=DEBUG
quarkus.log.category."io.opentelemetry.exporter".level=DEBUG