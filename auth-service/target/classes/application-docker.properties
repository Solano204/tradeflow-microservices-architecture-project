# ============================================================
# TradeFlow Auth Service ? Docker Profile
# ============================================================
# Okta SSO (disabled for local)
tradeflow.okta.enabled=false
tradeflow.okta.issuer=https://placeholder.okta.com/oauth2/default
tradeflow.okta.client-id=local-disabled
tradeflow.okta.client-secret=local-disabled
tradeflow.okta.redirect-uri=http://localhost:8080/auth/okta/callback
tradeflow.okta.scopes=openid profile email
quarkus.application.name=tradeflow-auth-service
quarkus.application.version=1.0.0
quarkus.http.port=8080
quarkus.http.root-path=/

# PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=tradeflow_auth
quarkus.datasource.password=tradeflow_auth_pass
quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/tradeflow_auth
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.acquisition-timeout=30
quarkus.datasource.jdbc.leak-detection-interval=120
quarkus.datasource.jdbc.validation-query-sql=SELECT 1

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.out-of-order=false
quarkus.flyway.clean-disabled=true

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.bind-parameters=false

# Redis
quarkus.redis.hosts=redis://redis:6379
quarkus.redis.password=
quarkus.redis.timeout=5S
quarkus.redis.max-pool-size=20
quarkus.redis.max-pool-waiting=100

# JWT
mp.jwt.verify.publickey.location=/app/keys/jwt-public-key.pem
smallrye.jwt.sign.key.location=/app/keys/jwt-private-key.pem
smallrye.jwt.new-token.lifespan=900
smallrye.jwt.new-token.issuer=https://auth.tradeflow.io

tradeflow.jwt.kid=auth-key-2024-v1
tradeflow.jwt.issuer=https://auth.tradeflow.io
tradeflow.jwt.access-token.ttl-seconds=900
tradeflow.jwt.refresh-token.ttl-seconds=2592000

# Refresh token
tradeflow.refresh-token.redis-prefix=rt:
tradeflow.refresh-token.ttl-days=30

# Kafka
kafka.bootstrap.servers=kafka:29092
mp.messaging.outgoing.auth-outbox.connector=smallrye-kafka
mp.messaging.outgoing.auth-outbox.topic=auth-events
mp.messaging.outgoing.auth-outbox.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.auth-outbox.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.auth-outbox.acks=all
mp.messaging.outgoing.auth-outbox.retries=3
mp.messaging.outgoing.auth-outbox.enable.idempotence=true

# OKTA (if enabled)
tradeflow.okta.enabled=${OKTA_ENABLED:false}
tradeflow.okta.issuer=${OKTA_ISSUER:https://your-org.okta.com/oauth2/default}
tradeflow.okta.client-id=${OKTA_CLIENT_ID:change-me}
tradeflow.okta.client-secret=${OKTA_CLIENT_SECRET:change-me}
tradeflow.okta.redirect-uri=${OKTA_REDIRECT_URI:http://localhost:8080/auth/okta/callback}
tradeflow.okta.scopes=openid profile email

# Health
quarkus.smallrye-health.root-path=/actuator/health
quarkus.smallrye-health.liveness-path=/actuator/health/live
quarkus.smallrye-health.readiness-path=/actuator/health/readiness
quarkus.smallrye-health.startup-path=/actuator/health/startup

# Metrics
quarkus.micrometer.export.prometheus.path=/actuator/prometheus

# Logging
quarkus.log.level=INFO
quarkus.log.category."io.tradeflow".level=DEBUG
quarkus.log.console.json=false

# CORS (adjust for your frontend)
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:8081
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-device-fingerprint
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.exposed-headers=location,info

# Swagger
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# OpenAPI
quarkus.smallrye-openapi.info-title=TradeFlow Auth Service API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Authentication and authorization service for TradeFlow marketplace
quarkus.smallrye-openapi.path=/openapi

# Outbox relay
tradeflow.outbox.relay.interval-ms=${OUTBOX_RELAY_INTERVAL_MS:500}
tradeflow.outbox.relay.batch-size=${OUTBOX_RELAY_BATCH_SIZE:50}