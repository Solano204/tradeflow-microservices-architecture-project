# =============================================================================
# TradeFlow - Order Service
# Spring Boot 3.2 | Java 21 | PostgreSQL | Kafka | Event Sourcing | SAGA
# =============================================================================

server.port=8084
spring.application.name=order-service

# --- Virtual Threads (Java 21) -----------------------------------------------
spring.threads.virtual.enabled=true

# --- PostgreSQL ---------------------------------------------------------------
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5437/order_db}
spring.datasource.username=${POSTGRES_USER:order}
spring.datasource.password=${POSTGRES_PASSWORD:order_secret}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=3000

# --- JPA ---------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- Flyway ------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Kafka -------------------------------------------------------------------
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# --- Security / JWT ----------------------------------------------------------
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWK_SET_URI:http://localhost:8080/.well-known/jwks.json}

# --- Internal Service URLs ---------------------------------------------------
services.inventory.url=${INVENTORY_SERVICE_URL:http://localhost:8083}
services.identity.url=${IDENTITY_SERVICE_URL:http://localhost:8081}
services.catalog.url=${CATALOG_SERVICE_URL:http://localhost:8082}

# --- Resilience4j ------------------------------------------------------------
resilience4j.bulkhead.instances.inventory-check.max-concurrent-calls=20
resilience4j.bulkhead.instances.inventory-check.max-wait-duration=100ms
resilience4j.bulkhead.instances.identity-check.max-concurrent-calls=20
resilience4j.bulkhead.instances.catalog-check.max-concurrent-calls=10

resilience4j.circuitbreaker.instances.inventory-check.sliding-window-size=10
resilience4j.circuitbreaker.instances.inventory-check.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.inventory-check.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.identity-check.sliding-window-size=10
resilience4j.circuitbreaker.instances.identity-check.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.identity-check.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.catalog-check.sliding-window-size=10
resilience4j.circuitbreaker.instances.catalog-check.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.catalog-check.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.inventory-check.record-exceptions=java.io.IOException,java.net.ConnectException,java.util.concurrent.TimeoutException
resilience4j.circuitbreaker.instances.identity-check.record-exceptions=java.io.IOException,java.net.ConnectException,java.util.concurrent.TimeoutException

resilience4j.retry.instances.internal-calls.max-attempts=2
resilience4j.retry.instances.internal-calls.wait-duration=50ms
resilience4j.retry.instances.internal-calls.retry-exceptions=java.io.IOException,java.net.ConnectException

resilience4j.timelimiter.instances.internal-calls.timeout-duration=2s
resilience4j.timelimiter.instances.internal-calls.cancel-running-future=true

# --- Actuator ----------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# =============================================================================
# DISTRIBUTED TRACING - Zipkin via Micrometer + Brave
#
# HOW IT WORKS:
#   1. HTTP request arrives  -> Spring creates root span with traceId=abc123
#   2. Every PostgreSQL query -> child span, same traceId (auto via datasource-micrometer)
#   3. KafkaTemplate.send()  -> injects "traceparent: 00-abc123-..." header (auto)
#   4. Consumer service      -> extracts header -> resumes same traceId
#   5. All spans shipped to Zipkin -> one complete trace in the UI
# =============================================================================

management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=W3C

# Add traceId and spanId to every log line
logging.pattern.level=%5p [${spring.application.name},%X{traceId},%X{spanId}]

# --- SpringDoc ---------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Logging -----------------------------------------------------------------
logging.level.io.tradeflow=INFO
logging.level.org.springframework.security=WARN
logging.level.io.github.resilience4j=WARN
logging.level.io.tradeflow.order.service.OutboxRelayService=DEBUG
logging.level.org.springframework.kafka=INFO